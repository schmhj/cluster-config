apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: workload-appset-dev
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/schmhj/cluster-config.git
        revision: HEAD
        directories:
          - path: apps/workloads/*/overlays/dev
  template:
    metadata:
      name: "{{index .path.segments 2}}-dev"
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: '5'
      labels:
        layer: "3"
        env: dev
        domain: workload
    spec:
      project: workload-dev
      source:
        repoURL: https://github.com/schmhj/cluster-config.git
        targetRevision: HEAD
        path: "{{.path.path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true