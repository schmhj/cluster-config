apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: workload-appset-prod-us-ashburn-1
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
  - matrix:
      generators:
      - git:
          repoURL: https://github.com/schmhj/cluster-config.git
          revision: feature/deployment-strategy
          directories:
          - path: apps/workloads/*/overlays/prod/region/us-ashburn-1
      - git:
          repoURL: https://github.com/schmhj/cluster-config.git
          revision: feature/deployment-strategy
          files:
          - path: "{{.path.path}}/config.json"

  template:
    metadata:
      name: "{{index .path.segments 2}}-prod-us-ashburn-1"
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "5"
      labels:
        layer: "3"
        env: prod
        domain: workload
        region: us-ashburn-1
    spec:
      project: workload-prod
      destination:
        server: https://kubernetes.default.svc
        namespace: workload
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            maxDuration: 3m0s
            factor: 2
  templatePatch: |
    spec:
      sources:
        - repoURL: '{{ .chartRepo }}'
          targetRevision: '{{ .chartVersion }}'
      {{- if .isGitRepo }}
          path: '{{ .chartName }}'
      {{- else }}
          chart: '{{ .chartName }}'
      {{- end }}
          helm:
            valueFiles:
              - $values/apps/workloads/{{index .path.segments 2}}/base/values.yaml
              - $values/apps/workloads/{{index .path.segments 2}}/overlays/prod/values.yaml
              - $values/apps/workloads/{{index .path.segments 2}}/overlays/prod/region/{{index .path.segments 6}}/values.yaml
              
        - repoURL: https://github.com/schmhj/cluster-config.git
          targetRevision: HEAD
          ref: values