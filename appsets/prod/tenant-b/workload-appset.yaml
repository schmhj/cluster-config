apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: workload-appset-prod-tenant-b
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
  - matrix:
      generators:
      - git:
          repoURL: https://github.com/schmhj/cluster-config.git
          revision: main
          directories:
          - path: apps/workloads/*/overlays/prod/tenant-b
      - git:
          repoURL: https://github.com/schmhj/cluster-config.git
          revision: main
          files:
          - path: "{{.path.path}}/config.json"

  template:
    metadata:
      name: "{{index .path.segments 2}}-prod-tenant-b"
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "5"
      labels:
        layer: "3"
        env: prod
        domain: workload
        tenant: tenant-b
    spec:
      project: workload-prod
      destination:
        server: https://129.158.33.235:6443
        namespace: '{{ .namespace | default "workload" }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            maxDuration: 3m0s
            factor: 2
  templatePatch: |
    spec:
      sources:
        - repoURL: '{{ .chartRepo }}'
          targetRevision: '{{ .chartVersion }}'
      {{- if .isGitRepo }}
          path: '{{ .chartName }}'
      {{- else }}
          chart: '{{ .chartName }}'
      {{- end }}
          helm:
            valueFiles:
              - $values/apps/workloads/{{index .path.segments 2}}/base/values.yaml
              - $values/apps/workloads/{{index .path.segments 2}}/overlays/prod/values.yaml
              - $values/apps/workloads/{{index .path.segments 2}}/overlays/prod/tenant-b/values.yaml
              
        - repoURL: https://github.com/schmhj/cluster-config.git
          targetRevision: main
          ref: values
