apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app-prod-us-ashburn-1
  namespace: argocd
  finalizers:
    - argoproj.io/resources-finalizer
spec:
  project: default
  source:
    repoURL: https://github.com/schmhj/cluster-config.git
    targetRevision: HEAD
    path: appsets/prod/us-ashburn-1
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    retry:
      limit: 5
      backoff:
        duration: 5s
        maxDuration: 3m0s
        factor: 2