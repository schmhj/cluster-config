apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: appprojects-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - argoproj.io/resources-finalizer
spec:
  project: default                           
  source:
    repoURL: https://github.com/schmhj/cluster-config.git
    targetRevision: HEAD
    path: appprojects/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        maxDuration: 3m0s
        factor: 2