apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: managed
servers: 1
image: rancher/k3s:v1.32.3-k3s1
registries:
  config: |
    mirrors:
      docker.io:
        endpoint:
          - "https://registry-1.docker.io"
options:
  k3d:
    wait: true
    timeout: "60s"
  k3s:
    extraArgs:
      - arg: --tls-san=127.0.0.1
        nodeFilters:
          - server:*
  kubeconfig:
    updateDefaultKubeconfig: true
    switchCurrentContext: false