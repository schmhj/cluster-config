---
# ── Certificate: Self-signed for traefik and ArgoCD ───────────
# You may replace this with a proper certificate from a CA
# For production, consider using Let's Encrypt via cert-manager
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: newyeti-tls-cert
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  secretName: newyeti-tls-cert
  duration: 2160h # 90 days
  renewBefore: 360h # 15 days
  privateKey:
    algorithm: ECDSA
    size: 256
  subject:
    organizations:
      - newyeti
  dnsNames:
    - newyeti.qzz.io
    - *.newyeti.qzz.io
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
    group: cert-manager.io

