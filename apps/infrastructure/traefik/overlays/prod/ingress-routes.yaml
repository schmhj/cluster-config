---
# ── IngressRoute: HTTP → HTTPS redirect catch-all ────────────
# Handles the edge case where LB doesn't terminate HTTP itself
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-api-prefix
  namespace: traefik
spec:
  stripPrefix:
    prefixes:
      - /argocd

---
# ── IngressRoute: Traefik Dashboard (HTTPS) ──────────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`obscure-acorn-g9x7j697rjpc75x-30443.app.github.dev`) && (PathPrefix(`/dashboard`) || PathPrefix(`/api`))
      kind: Rule
      middlewares:
        - name: dashboard-auth
          namespace: traefik
      services:
        - name: api@internal     # Built-in Traefik API service
          kind: TraefikService

---
# ── IngressRoute: Argocd (HTTPS) ──────────────────────
# Covers: /argocd
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-argocd
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  # tls:
  #   secretName: letsencrypt-staging-account-key - for prod use only
  entryPoints:
    - websecure
  routes:
    # ── Microservie template Service ──────────────────────────────────────────
    - match: Host(`obscure-acorn-g9x7j697rjpc75x-30443.app.github.dev`) && PathPrefix(`/argocd`)
      kind: Rule
      priority: 10
      middlewares:
        - name: strip-api-prefix
          namespace: traefik
        - name: rate-limit
          namespace: traefik
        - name: secure-headers
          namespace: traefik
      services:
        - name: argocd-server 
          namespace: argocd
          port: 30080