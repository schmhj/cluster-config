---
# ── TLSStore: Default certificate store ──────────────────────
apiVersion: traefik.io/v1alpha1
kind: TLSStore
metadata:
  name: default
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  defaultCertificate:
    secretName: newyeti-tls-cert

---
# ── Middleware: Redirect HTTP → HTTPS ────────────────────────
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-https
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  redirectScheme:
    scheme: https
    permanent: true

---
# ── Middleware: strip path prefix before forwarding ──────────
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-api-prefix
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  stripPrefix:
    prefixes:
      - /argocd

---
# ── IngressRoute: HTTP → HTTPS redirect catch-all ────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: http-to-https-redirect
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  entryPoints:
    - web
  routes:
    - match: HostRegexp(`{host:.+}`)
      kind: Rule
      priority: 1
      middlewares:
        - name: redirect-to-https
          namespace: traefik
      services:
        - name: noop@internal
          kind: TraefikService

---
# ── IngressRoute: Traefik Dashboard (HTTPS) ──────────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`traefik.newyeti.qzz.io`) && PathPrefix(`/dashboard`)
      kind: Rule
      middlewares:
        - name: dashboard-redirect
          namespace: traefik
      services:
        - name: api@internal
          kind: TraefikService
    - match: Host(`traefik.newyeti.qzz.io`) && PathPrefix(`/api`)
      kind: Rule
      services:
        - name: api@internal
          kind: TraefikService
  tls:
    secretName: newyeti-tls-cert

---
# ── Middleware: Redirect /dashboard to /dashboard/ ─────────────
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: dashboard-redirect
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  redirectRegex:
    regex: ^https://traefik\.newyeti\.qzz\.io/dashboard$
    replacement: https://traefik.newyeti.qzz.io/dashboard/
    permanent: true

---
# ── IngressRoute: ArgoCD (HTTPS) ──────────────────────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-argocd
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`argocd.newyeti.qzz.io`)
      kind: Rule
      priority: 10
      # middlewares:
      #   - name: strip-api-prefix
      #     namespace: traefik
      #   - name: secure-headers
      #     namespace: traefik
      services:
        - name: argocd-server
          namespace: argocd
          port: 8080
          scheme: http
  tls:
    secretName: newyeti-tls-cert