---
# ── IngressRoute: HTTP → HTTPS redirect catch-all ────────────
# Handles the edge case where LB doesn't terminate HTTP itself
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: http-to-https-redirect
  namespace: traefik
spec:
  stripPrefix:
    prefixes:
      - /argocd
  entryPoints:
    - websecure                        # Port 443
  routes:
    - match: HostRegexp(`{host:.+}`)
      kind: Rule
      priority: 1
      middlewares: []
      services:
        - name: noop@internal
          kind: TraefikService

---
# ── IngressRoute: Traefik Dashboard (HTTPS) ──────────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`127.0.0.1`) && (PathPrefix(`/dashboard`) || PathPrefix(`/api`))
      kind: Rule
      middlewares:
        - name: dashboard-auth
          namespace: traefik
      services:
        - name: api@internal     # Built-in Traefik API service
          kind: TraefikService

---
# ── IngressRoute: Argocd (HTTPS) ──────────────────────
# Covers: /argocd
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-microservices
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  # tls:
  #   secretName: letsencrypt-staging-account-key - for prod use only
  entryPoints:
    - websecure
  routes:
    # ── Microservie template Service ──────────────────────────────────────────
    - match: Host(`127.0.0.1`) && PathPrefix(`/argocd`)
      kind: Rule
      priority: 10
      middlewares:
        - name: strip-api-prefix
          namespace: traefik
        - name: rate-limit
          namespace: traefik
        - name: secure-headers
          namespace: traefik
      services:
        - name: argocd-server 
          namespace: argocd
          port: 30179