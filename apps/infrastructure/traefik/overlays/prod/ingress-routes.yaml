---
# ── Middleware: Redirect HTTP → HTTPS ────────────────────────
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-https
  namespace: traefik
spec:
  redirectScheme:
    scheme: https
    permanent: true

---
# ── IngressRoute: HTTP → HTTPS redirect catch-all ────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: http-to-https-redirect
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  entryPoints:
    - web
  routes:
    - match: HostRegexp(`{host:.+}`)
      kind: Rule
      priority: 1
      middlewares:
        - name: redirect-https
          namespace: traefik
      services:
        - name: noop@internal
          kind: TraefikService

---
# ── Middleware: strip path prefix before forwarding ──────────
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-api-prefix
  namespace: traefik
spec:
  stripPrefix:
    prefixes:
      - /argocd

---
# ── IngressRoute: Traefik Dashboard (HTTPS) ──────────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  entryPoints:
    - websecure
  tls:
    secretName: traefik-tls-prod
  routes:
    - match: Host(`traefik.newyeti.qzz.io`) && (PathPrefix(`/dashboard`) || PathPrefix(`/api`))
      kind: Rule
      middlewares:
        - name: dashboard-auth
          namespace: traefik
      services:
        - name: api@internal     # Built-in Traefik API service
          kind: TraefikService

---
# ── IngressRoute: ArgoCD (HTTPS) ──────────────────────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-argocd
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  entryPoints:
    - websecure
  tls:
    secretName: traefik-tls-prod
  routes:
    - match: Host(`argocd.newyeti.qzz.io`)
      kind: Rule
      priority: 10
      middlewares:
        - name: strip-api-prefix
          namespace: traefik
        - name: rate-limit
          namespace: traefik
        - name: secure-headers
          namespace: traefik
      services:
        - name: argocd-server
          namespace: argocd
          port: 8080