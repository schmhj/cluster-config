---
# ── TLSStore: Default certificate store ──────────────────────
apiVersion: traefik.io/v1alpha1
kind: TLSStore
metadata:
  name: default
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  defaultCertificate:
    secretName: newyeti-tls-cert

---
# ── ServersTransport: Insecure TLS for ArgoCD backend ────────
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: argocd-transport
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  insecureSkipVerify: true

---
# ── Middleware: Forward HTTPS headers for ArgoCD ──────────────
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: argocd-headers
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: "https"
      X-Forwarded-Scheme: "https"
      X-Forwarded-Host: "argocd.newyeti.qzz.io"
      X-Forwarded-Port: "443"
      X-Real-IP: "127.0.0.1"

---
# ── Middleware: Redirect HTTP → HTTPS ────────────────────────
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-https
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  redirectScheme:
    scheme: https
    permanent: true

---
# ── Middleware: strip path prefix before forwarding ──────────
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-api-prefix
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  stripPrefix:
    prefixes:
      - /argocd

---
# ── Middleware: Redirect /dashboard to /dashboard/ ─────────────
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: dashboard-redirect
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  redirectRegex:
    regex: ^https://traefik\.newyeti\.qzz\.io/dashboard$
    replacement: https://traefik.newyeti.qzz.io/dashboard/
    permanent: true

---
# ── IngressRoute: HTTP → HTTPS redirect catch-all ────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: http-to-https-redirect
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  entryPoints:
    - web
  routes:
    - match: HostRegexp(`{host:.+}`)
      kind: Rule
      priority: 1
      middlewares:
        - name: redirect-to-https
          namespace: traefik
      services:
        - name: noop@internal
          kind: TraefikService

---
# ── IngressRoute: Traefik Dashboard (HTTPS) ──────────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`traefik.newyeti.qzz.io`) && PathPrefix(`/dashboard`)
      kind: Rule
      middlewares:
        - name: dashboard-redirect
          namespace: traefik
        - name: dashboard-auth
          namespace: traefik
      services:
        - name: api@internal
          kind: TraefikService
    - match: Host(`traefik.newyeti.qzz.io`) && PathPrefix(`/api`)
      kind: Rule
      services:
        - name: api@internal
          kind: TraefikService
  tls:
    secretName: newyeti-tls-cert

---
# ── IngressRoute: Traefik Dashboard (HTTPS) ──────────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-server
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`argocd.newyeti.qzz.io`)
      kind: Rule
      services:
        - name: argocd-server
          namespace: argocd
          port: 80
      middlewares: []
  tls:
    secretName: newyeti-tls-cert