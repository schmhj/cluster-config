---
# ── IngressRoute: Traefik Dashboard (HTTPS) ──────────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: tenant-b-traefik-dashboard
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`traefik-b.newyeti.qzz.io`) && PathPrefix(`/dashboard`)
      kind: Rule
      middlewares:
        - name: dashboard-redirect
          namespace: traefik
        - name: dashboard-auth
          namespace: traefik
      services:
        - name: api@internal
          kind: TraefikService
    - match: Host(`traefik-b.newyeti.qzz.io`) && PathPrefix(`/api`)
      kind: Rule
      services:
        - name: api@internal
          kind: TraefikService
  tls:
    secretName: newyeti-tls-cert

---

apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: immich-server
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`immich.newyeti.qzz.io`)
      kind: Rule
      services:
        - name: immich-prod-tenant-b-server
          namespace: workloads
          port: 2283
      middlewares: []
  tls:
    secretName: newyeti-tls-cert
