---
# ── Middleware: strip path prefix before forwarding ──────────
# /api/users/* → users-svc:8080/  (prefix stripped)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-api-prefix
  namespace: traefik
spec:
  stripPrefix:
    prefixes:
      - /api

---
# ── IngressRoute: Traefik Dashboard (HTTPS) ──────────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`127.0.0.1`) && (PathPrefix(`/dashboard`) || PathPrefix(`/api`))
      kind: Rule
      services:
        - name: api@internal     # Built-in Traefik API service
          kind: TraefikService

---
# ── IngressRoute: Microservices (HTTPS) ──────────────────────
# Covers: /api/sample, /api
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-microservices
  namespace: traefik
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  entryPoints:
    - web
  routes:
    # ── Microservie template Service ──────────────────────────────────────────
    - match: Host(`127.0.0.1`) && PathPrefix(`/api`)
      kind: Rule
      priority: 10
      middlewares:
        - name: strip-api-prefix
          namespace: traefik
      #   - name: rate-limit
      #     namespace: traefik
      #   - name: secure-headers
      #     namespace: traefik
      services:
        - name: microservice-template-dev
          namespace: workload
          port: 9000
    
    
    # ── Sample Service ────────────────────────────────────────
    - match: Host(`127.0.0.1`) && PathPrefix(`/api/samples`)
      kind: Rule
      priority: 10
      middlewares:
        - name: strip-api-prefix
          namespace: traefik
        # - name: rate-limit
        #   namespace: traefik
        # - name: secure-headers
        #   namespace: traefik
      services:
        - name: sample-app-dev-simple-go
          namespace: workload
          port: 8080