apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
commonAnnotations:
  argocd.argoproj.io/sync-wave: "3"
resources:
  - ../../base

patches:
  - path: traefik-service-patch.yaml
    target:
      group: ""
      version: v1
      kind: Service
      name: traefik
  - path: traefik-deployment-patch.yaml
    target:
      group: apps
      version: v1
      kind: Deployment
      name: traefik