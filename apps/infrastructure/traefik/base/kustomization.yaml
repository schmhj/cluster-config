apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
commonAnnotations:
  argocd.argoproj.io/sync-wave: "3"
# helmCharts moved to overlays so each overlay controls its own values file
helmCharts:
  - name: traefik
    repo: https://traefik.github.io/charts
    version: "39.0.5"
    namespace: traefik
    releaseName: traefik
    valuesFile: values.yaml
# helmCharts moved to overlays so each overlay controls its own values file
