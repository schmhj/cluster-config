# Minimum Traefik configuration for dashboard via NodePort
api:
  dashboard: true
  insecure: false

service:
  type: NodePort

ports:
  web:
    expose:
      default: true
  traefik:
    expose:
      default: true
    nodePort: 30420

additionalArguments:
  - "--serversTransport.insecureSkipVerify=true"
  - "--log.level=INFO"
  - "--accesslog=true"
  # optional settings if you want explicit entrypoint config:
  # - "--entrypoints.web.address=:80"
