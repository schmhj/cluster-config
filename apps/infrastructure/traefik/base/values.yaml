# Traefik configuration for dashboard via NodePort (based on official Helm chart)
# Ref: https://github.com/traefik/traefik-helm-chart/blob/master/traefik/values.yaml

# ── Deployment ───────────────────────────────────────────────
deployment:
  enabled: true
  replicas: 2                    # Override to 1 in dev overlay
  revisionHistoryLimit: 3

# ── Pod Disruption Budget ─────────────────────────────────────
podDisruptionBudget:
  enabled: true
  minAvailable: 1

api:
  # -- Enable the dashboard
  dashboard: true
  # -- Enable the insecure API (HTTP)
  insecure: false
  # -- Enable the debug API
  debug: false

ingressRoute:
  dashboard:
    # -- Create an IngressRoute for the dashboard
    enabled: true
    # -- Override entryPoints for dashboard to go through exposed web port (NodePort 30480)
    entryPoints:
      - web

service:
  enabled: true
  type: LoadBalancer
  annotations: {}

ports:
  traefik:
    port: 8080
    expose:
      default: false
    exposedPort: 8080
    protocol: TCP
   
  web:
    port: 8000
    expose:
      default: true
    exposedPort: 8000
    protocol: TCP
  
  websecure:
    port: 8443
    expose:
      default: true
    exposedPort: 443
    protocol: TCP


# ── Resources ─────────────────────────────────────────────────
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
