# Traefik configuration for dashboard via NodePort (based on official Helm chart)
# Ref: https://github.com/traefik/traefik-helm-chart/blob/master/traefik/values.yaml

# ── Deployment ───────────────────────────────────────────────
deployment:
  enabled: true
  replicas: 2                    # Override to 1 in dev overlay
  revisionHistoryLimit: 3

# ── Pod Disruption Budget ─────────────────────────────────────
podDisruptionBudget:
  enabled: true
  minAvailable: 1

api:
  # -- Enable the dashboard
  dashboard: true
  # -- Enable the insecure API (HTTP)
  insecure: false
  # -- Enable the debug API
  debug: false

service:
  enabled: true
  type: LoadBalancer
  annotations: {}

ports:
  traefik:
    port: 8080
    expose:
      default: false
    exposedPort: 8080
    protocol: TCP
   
  web:
    port: 8000
    expose:
      default: true
    exposedPort: 8000
    protocol: TCP
  
  websecure:
    port: 8443
    expose:
      default: true
    exposedPort: 443
    protocol: TCP


# ── Resources ─────────────────────────────────────────────────
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

 # ← allows IngressRoute to reference services in other namespaces
providers:
  kubernetesCRD:
    allowCrossNamespace: true
    allowExternalNameServices: true 


logs:
  general:
    level: INFO          # traefik system logs

  access:
    enabled: true         # ← enable request/response logs for ingestion
    format: json         # json or clf (common log format)
    fields:
      general:
        defaultMode: keep
      headers:
        defaultMode: keep
        names:
          User-Agent: keep
          Authorization: redact    # hide sensitive headers
          Content-Type: keep