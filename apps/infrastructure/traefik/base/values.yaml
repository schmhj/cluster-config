# Minimum Traefik configuration for dashboard via NodePort
api:
  dashboard: true
  insecure: true

service:
  type: NodePort

ports:
  web:
    expose:
      default: true
    nodePort: 30280
  traefik:
    expose:
      default: false

additionalArguments:
  - "--serversTransport.insecureSkipVerify=true"
  - "--log.level=INFO"
  - "--accesslog=true"
  # optional settings if you want explicit entrypoint config:
  # - "--entrypoints.web.address=:80"
