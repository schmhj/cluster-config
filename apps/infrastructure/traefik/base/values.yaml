# Minimum Traefik configuration for dashboard via NodePort
api:
  dashboard: true
  insecure: false

ingressRoute:
  dashboard:
    enabled: true

service:
  type: NodePort

ports:
  web:
    expose:
      default: true
  traefik:
    expose:
      default: true
    nodePort: 30420
    exposedPort: 9000

additionalArguments:
  - "--serversTransport.insecureSkipVerify=true"
  - "--log.level=INFO"
  - "--accesslog=true"

