---
# ── Middleware: strip path prefix before forwarding ──────────
# /api/users/* → users-svc:8080/  (prefix stripped)
# apiVersion: traefik.io/v1alpha1
# kind: Middleware
# metadata:
#   name: strip-api-prefix
#   namespace: traefik
# spec:
#   stripPrefix:
#     prefixes:
#       - /api/templates
#       - /api/samples

# ---
# ── Middleware: rate limiting (global) ───────────────────────
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rate-limit
  namespace: traefik
spec:
  rateLimit:
    average: 100
    burst: 50

---
# ── Middleware: security headers ─────────────────────────────
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: secure-headers
  namespace: traefik
spec:
  headers:
    frameDeny: true
    sslRedirect: true
    browserXssFilter: true
    contentTypeNosniff: true
    forceSTSHeader: true
    stsIncludeSubdomains: true
    stsPreload: true
    stsSeconds: 31536000
    customResponseHeaders:
      X-Robots-Tag: noindex,nofollow,nosnippet,noarchive,notranslate,noimageindex

---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: dashboard-auth
  namespace: traefik
spec:
  basicAuth:
    secret: traefik-dashboard-secret
    removeHeader: true           # Strip Authorization header from upstream

---
# ── IngressRoute: HTTP → HTTPS redirect catch-all ────────────
# Handles the edge case where LB doesn't terminate HTTP itself
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: http-to-https-redirect
  namespace: traefik
spec:
  entryPoints:
    - web                        # Port 80
  routes:
    - match: HostRegexp(`{host:.+}`)
      kind: Rule
      priority: 1
      middlewares: []
      services:
        - name: noop@internal
          kind: TraefikService

