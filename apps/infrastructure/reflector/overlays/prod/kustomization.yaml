apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  - patch: |-
      - op: replace
        path: /helmCharts/0/version
        value: "10.0.16"                     # pinned prod version, independently upgradable
      - op: replace
        path: /helmCharts/0/valuesInline/replicaCount
        value: 2
      - op: replace
        path: /helmCharts/0/valuesInline/serviceMonitor/enabled
        value: true