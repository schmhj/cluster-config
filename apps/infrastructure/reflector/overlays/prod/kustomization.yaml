apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - patch: |-
      - op: add
        path: /helmCharts/0/valuesInline/replicaCount
        value: 2
      - op: add
        path: /helmCharts/0/valuesInline/serviceMonitor
        value:
          enabled: true
      - op: add
        path: /helmCharts/0/valuesInline/resources
        value:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
    target:
      group: kustomize.config.k8s.io
      version: v1beta1
      kind: Kustomization