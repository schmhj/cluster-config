apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
helmCharts:
  - name: reflector
    repo: https://emberstack.github.io/helm-charts
    version: "10.0.16"                       
    namespace: kube-system
    releaseName: reflector
    valuesFile: values.yaml
    valuesInline:
      fullnameOverride: reflector