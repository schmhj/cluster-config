apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - patch: |-
      - op: add
        path: /helmCharts/0/valuesInline/replicaCount
        value: 1
      - op: add
        path: /helmCharts/0/valuesInline/serviceMonitor
        value:
          enabled: false