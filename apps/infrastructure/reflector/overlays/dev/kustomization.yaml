apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
commonAnnotations:
  argocd.argoproj.io/sync-wave: "1"
resources:
  - ../../base

patches:
  - target:
      group: kustomize.config.k8s.io
      version: v1beta1
      kind: Kustomization
    patch: |-
      - op: add
        path: /helmCharts/0/valuesInline/replicaCount
        value: 1
      - op: add
        path: /helmCharts/0/valuesInline/serviceMonitor
        value:
          enabled: false
