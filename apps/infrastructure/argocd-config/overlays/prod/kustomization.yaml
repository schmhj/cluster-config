apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
commonAnnotations:
  argocd.argoproj.io/sync-wave: "3"
resources:
  - ../../base
  - github-app-secret.yaml
  - ghcr-oci-secret.yaml
  - argocd-server-service-patch.yaml

patches:
  - target:
      kind: ArgoCD
      name: argocd
      namespace: argocd
    path: argocd-insecure-patch.yaml
