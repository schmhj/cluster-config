apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
helmCharts:
  - name: sealed-secrets
    repo: https://bitnami-labs.github.io/sealed-secrets
    version: "2.18.3"
    namespace: kube-system
    releaseName: sealed-secrets
    valuesInline:
      fullnameOverride: sealed-secrets
      resources:
        requests:
          memory: "64Mi"