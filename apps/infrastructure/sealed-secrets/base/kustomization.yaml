apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
commonAnnotations:
  argocd.argoproj.io/sync-wave: "2"
helmCharts:
  - name: sealed-secrets
    repo: https://bitnami.github.io/sealed-secrets
    version: "2.19.0"
    namespace: kube-system
    releaseName: sealed-secrets
    includeCrds: true
    valuesFile: values.yaml
    