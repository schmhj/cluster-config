apiVersion: batch/v1
kind: Job
metadata:
  name: wait-for-sealedsecrets-crd
  namespace: kube-system
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    argocd.argoproj.io/sync-wave: "2"       # runs in same wave as sealed-secrets install
spec:
  template:
    spec:
      serviceAccountName: argocd-manager
      restartPolicy: OnFailure
      containers:
        - name: wait-for-crd
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for SealedSecret CRD..."
              until kubectl get crd sealedsecrets.bitnami.com 2>/dev/null; do
                echo "CRD not ready yet, retrying in 5s..."
                sleep 5
              done
              echo "SealedSecret CRD is ready"