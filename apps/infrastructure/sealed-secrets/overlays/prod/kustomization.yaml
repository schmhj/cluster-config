apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  - patch: |-
      - op: replace
        path: /helmCharts/0/version
        value: "2.18.3"                      # independently pinned for prod
      - op: replace
        path: /helmCharts/0/valuesInline/resources/requests/memory
        value: "256Mi"