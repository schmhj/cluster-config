apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - target:
      group: bitnami.com
      version: v1alpha1
      kind: SealedSecret
      name: infra-docker-config
      namespace: infrastructure
    patch: |-
      - op: replace
        path: /metadata/annotations/reflector.v1.k8s.emberstack.com~1reflection-allowed-namespaces
        value: "microservice-app-dev"
      - op: replace
        path: /spec/template/metadata/annotations/reflector.v1.k8s.emberstack.com~1reflection-allowed-namespaces
        value: "microservice-app-dev"
