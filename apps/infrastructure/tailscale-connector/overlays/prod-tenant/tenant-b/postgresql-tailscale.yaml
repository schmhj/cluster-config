apiVersion: v1
kind: Service
metadata:
  name: postgresql-nodeport
  namespace: workloads
spec:
  type: NodePort
  selector:
    app.kubernetes.io/component: primary
    app.kubernetes.io/instance: postgresql-prod-tenant-b
    app.kubernetes.io/name: postgresql
  ports:
    - port: 5432
      targetPort: tcp-postgresql
      nodePort: 30432
      protocol: TCP
      name: tcp-postgresql
