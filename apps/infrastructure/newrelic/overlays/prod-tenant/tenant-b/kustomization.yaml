apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
commonAnnotations:
  argocd.argoproj.io/sync-wave: "3"
resources:
  - ../../prod

patches:
  - target:
      kind: Deployment
      name: newrelic-bundle
      namespace: monitoring
    patch:
      - op: replace
        path: /global/cluster
        value: oke-tenant-b