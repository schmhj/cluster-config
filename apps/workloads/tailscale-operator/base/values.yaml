oauth: {}

oauthSecretVolume:
  secret:
    secretName: tailscale-secret

installCRDs: false

operatorConfig:
  image:
    repository: docker.io/tailscale/k8s-operator
    tag: latest
    pullPolicy: Always
  logging: "info"
  hostname: "tailscale-operator"
  nodeSelector:
    kubernetes.io/os: linux

ingressClass:
  name: "tailscale"
  enabled: true

proxyConfig:
  image:
    repository: docker.io/tailscale/tailscale
    tag: latest
  defaultTags: "tag:k8s-operator"
  firewallMode: auto

apiServerProxyConfig:
  mode: "false"
  allowImpersonation: "false"
