global:
  postgresql:
    auth:
      existingSecret: postgresql-secret
      secretKeys:
        adminPasswordKey: postgresql-admin-password
        userPasswordKey: postgresql-immich-password

auth:
  username: immich
  database: immich
  # password is sourced from the existing secret defined in global.postgresql.auth.existingSecret

primary:
  image:
    registry: ghcr.io
    repository: immich-app/postgres
    tag: 18-vectorchord0.4-pgvector0.8.1
    initdb:
      scripts:
        create-extensions.sql: |
          \c immich
          CREATE EXTENSION IF NOT EXISTS cube CASCADE;
          CREATE EXTENSION IF NOT EXISTS earthdistance CASCADE;
          CREATE EXTENSION IF NOT EXISTS vector CASCADE;
          CREATE EXTENSION IF NOT EXISTS vchord CASCADE;

  # Prevent voluntary pod disruption during node drains or cluster operations
  pdb:
    create: true
    minAvailable: 1

  # Resource allocation for the database container
  resources:
    limits:
      cpu: "1000m"
      memory: 2Gi
    requests:
      cpu: "250m"
      memory: 512Mi

  # Persistence configuration (shared PVC with Immich)
  persistence:
    enabled: true
    existingClaim: postgres-data

  # Custom PostgreSQL configuration parameters (postgresql.conf)
  extendedConfiguration: |
    max_connections = 50
    shared_buffers = 64MB
    work_mem = 1MB
    effective_cache_size = 192MB
    maintenance_work_mem = 16MB

  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 1
          preference:
            matchExpressions:
              - key: workload
                operator: In
                values:
                  - workload-0
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: tier
                operator: In
                values:
                  - workload
  tolerations:
    - key: "tier"
      operator: "Equal"
      value: "workload"
      effect: "NoSchedule"

  podSecurityContext:
    fsGroup: 1001
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

# Disable metrics architecture by default (set to true if using Prometheus)
metrics:
  enabled: false

architecture: standalone