global:
  postgresql:
    auth:
      existingSecret: postgresql-secret
      secretKeys:
        adminPasswordKey: postgresql-admin-password
        userPasswordKey: postgresql-immich-password

auth:
  username: immich
  database: immich
  # password is sourced from the existing secret defined in global.postgresql.auth.existingSecret

primary:
  # Prevent voluntary pod disruption during node drains or cluster operations
  pdb:
    create: true
    minAvailable: 1

  # Resource allocation for the database container
  resources:
    limits:
      cpu: "1000m"
      memory: 512Mi
    requests:
      cpu: "250m"
      memory: 256Mi

  # Persistence configuration (shared PVC with Immich)
  persistence:
    enabled: true
    existingClaim: data-storage

  # Custom PostgreSQL configuration parameters (postgresql.conf)
  extendedConfiguration: |
    max_connections = 50
    shared_buffers = 128MB
    work_mem = 2MB
    effective_cache_size = 384MB
    maintenance_work_mem = 32MB

  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: tier
                operator: In
                values:
                  - workload
              - key: workload
                operator: In
                values:
                  - workload-0
  tolerations:
    - key: "tier"
      operator: "Equal"
      value: "workload"
      effect: "NoSchedule"

  podSecurityContext:
    fsGroup: 1001
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

# Disable metrics architecture by default (set to true if using Prometheus)
metrics:
  enabled: false

architecture: standalone