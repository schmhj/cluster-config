global:
  postgresql:
    auth:
      username: app_user
      password: "YourSecurePasswordHere" # Replace with a strong password
      database: app_db
      # Optional: Define a specific password for the 'postgres' admin user
      postgresPassword: "YourAdminPasswordHere" 

primary:
  # Resource allocation for the database container
  resources:
    limits:
      cpu: "1"
      memory: 1Gi
    requests:
      cpu: "500m"
      memory: 512Mi

  # Persistence configuration
  persistence:
    enabled: true
    storageClass: "" # Leave empty to use the cluster's default StorageClass, or specify your own (e.g., standard, gp3)
    size: 8Gi
    mountPath: /bitnami/postgresql

  # Custom PostgreSQL configuration parameters (postgresql.conf)
  extendedConfiguration: |
    max_connections = 100
    shared_buffers = 256MB

# Disable metrics architecture by default (set to true if using Prometheus)
metrics:
  enabled: false