global:
  postgresql:
    auth:
      existingSecret: postgresql-secret
      secretKeys:
        adminPasswordKey: postgresql-admin-password
        userPasswordKey: postgresql-immich-password

auth:
  username: immich
  database: immich
  # password is sourced from the existing secret defined in global.postgresql.auth.existingSecret

primary:
  # Resource allocation for the database container
  resources:
    limits:
      cpu: "250m"
      memory: "256Mi"
    requests:
      cpu: "1000m"
      memory: "512Mi"

  # Persistence configuration
  persistence:
    enabled: true
    storageClass: "" # Leave empty to use the cluster's default StorageClass, or specify your own (e.g., standard, gp3)
    size: 8Gi
    mountPath: /bitnami/postgresql

  # Custom PostgreSQL configuration parameters (postgresql.conf)
  extendedConfiguration: |
    max_connections = 100
    shared_buffers = 256MB

# Disable metrics architecture by default (set to true if using Prometheus)
metrics:
  enabled: false

architecture: standalone