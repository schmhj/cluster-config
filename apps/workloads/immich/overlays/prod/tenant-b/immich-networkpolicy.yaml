apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-immich-access
  namespace: workloads
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: immich
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: tailscale
      ports:
        - protocol: TCP
          port: 2283
    - from:
        - podSelector:
            matchLabels:
              immich-access: "true"
      ports:
        - protocol: TCP
          port: 2283
